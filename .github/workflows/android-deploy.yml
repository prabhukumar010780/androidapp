name: Android Deploy

on:
  push:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/destiny-release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Decode google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      # Branch → build type. Single applicationId (com.destinyai.astrology) for
      # both — staging and release land in the SAME Play Console app, with the
      # ENV BuildConfig + versionNameSuffix telling testers which env they're on.
      # Mirrors iOS where TestFlight test/prod builds share one bundle id.
      - name: Resolve build type from branch
        id: config
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "build_type=release" >> "$GITHUB_OUTPUT"
            echo "task=bundleRelease" >> "$GITHUB_OUTPUT"
            echo "aab_dir=release" >> "$GITHUB_OUTPUT"
            echo "release_status=draft" >> "$GITHUB_OUTPUT"
          else
            echo "build_type=staging" >> "$GITHUB_OUTPUT"
            echo "task=bundleStaging" >> "$GITHUB_OUTPUT"
            echo "aab_dir=staging" >> "$GITHUB_OUTPUT"
            echo "release_status=completed" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AAB
        run: |
          if [ "${{ steps.config.outputs.build_type }}" = "release" ]; then
            ./gradlew "${{ steps.config.outputs.task }}" \
              -PversionCode="${{ github.run_number }}" \
              -PAPI_KEY_PRODUCTION="${{ secrets.DESTINY_API_KEY_PRODUCTION }}" \
              -PGOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}" \
              --no-daemon
          else
            ./gradlew "${{ steps.config.outputs.task }}" \
              -PversionCode="${{ github.run_number }}" \
              -PAPI_KEY_STAGING="${{ secrets.DESTINY_API_KEY_STAGING }}" \
              -PGOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}" \
              --no-daemon
          fi
        env:
          ANDROID_KEYSTORE_PATH: /tmp/destiny-release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify AAB does not contain wrong-environment API key
        env:
          STAGING_KEY: ${{ secrets.DESTINY_API_KEY_STAGING }}
          PROD_KEY: ${{ secrets.DESTINY_API_KEY_PRODUCTION }}
          BUILD_TYPE: ${{ steps.config.outputs.build_type }}
          AAB_DIR: ${{ steps.config.outputs.aab_dir }}
        run: |
          AAB="$(ls app/build/outputs/bundle/${AAB_DIR}/*.aab | head -n1)"
          if [ -z "$AAB" ] || [ "$STAGING_KEY" = "$PROD_KEY" ]; then
            echo "Skipping leak check (no AAB or shared key)"
            exit 0
          fi
          if [ "$BUILD_TYPE" = "release" ]; then
            WRONG_KEY="$STAGING_KEY"
            WRONG_ENV="staging"
          else
            WRONG_KEY="$PROD_KEY"
            WRONG_ENV="production"
          fi
          if unzip -p "$AAB" 2>/dev/null | strings | grep -F "$WRONG_KEY" >/dev/null; then
            echo "ERROR: ${WRONG_ENV} API key string found inside ${BUILD_TYPE} AAB"
            exit 1
          fi
          echo "OK: ${BUILD_TYPE} AAB does not contain ${WRONG_ENV} key"

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/668639087682/locations/global/workloadIdentityPools/github-actions-pool/providers/android-deploy
          service_account: android-deploy@circular-genius-481518-v0.iam.gserviceaccount.com

      - name: Diagnose AAB before upload
        run: |
          AAB="$(ls app/build/outputs/bundle/${{ steps.config.outputs.aab_dir }}/*.aab | head -n1)"
          if [ -z "$AAB" ]; then
            echo "::error::No AAB found at app/build/outputs/bundle/${{ steps.config.outputs.aab_dir }}/"
            exit 1
          fi
          echo "AAB path:    $AAB"
          echo "AAB size:    $(du -h "$AAB" | cut -f1)  ($(stat -c %s "$AAB" 2>/dev/null || stat -f %z "$AAB") bytes)"
          echo "AAB SHA-256: $(sha256sum "$AAB" | cut -d' ' -f1)"

      # Retry uploads: r0adkll/upload-google-play uses a non-resumable upload,
      # and Google's Play Edit token has ~45s TTL. Each attempt creates a fresh Edit.
      - name: Upload to Google Play (attempt 1)
        id: upload1
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          packageName: com.destinyai.astrology
          releaseFiles: app/build/outputs/bundle/${{ steps.config.outputs.aab_dir }}/*.aab
          track: internal
          status: ${{ steps.config.outputs.release_status }}

      - name: Wait before retry 2
        if: steps.upload1.outcome == 'failure'
        run: sleep 15

      - name: Upload to Google Play (attempt 2)
        id: upload2
        if: steps.upload1.outcome == 'failure'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          packageName: com.destinyai.astrology
          releaseFiles: app/build/outputs/bundle/${{ steps.config.outputs.aab_dir }}/*.aab
          track: internal
          status: ${{ steps.config.outputs.release_status }}

      - name: Wait before retry 3
        if: steps.upload1.outcome == 'failure' && steps.upload2.outcome == 'failure'
        run: sleep 30

      - name: Upload to Google Play (attempt 3, final)
        if: steps.upload1.outcome == 'failure' && steps.upload2.outcome == 'failure'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          packageName: com.destinyai.astrology
          releaseFiles: app/build/outputs/bundle/${{ steps.config.outputs.aab_dir }}/*.aab
          track: internal
          status: ${{ steps.config.outputs.release_status }}

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/destiny-release.keystore
