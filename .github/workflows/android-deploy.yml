name: Android Deploy

on:
  push:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/destiny-release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Set flavor and track (main=production, test=internal)
        id: config
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "flavor=production" >> "$GITHUB_OUTPUT"
            echo "track=production" >> "$GITHUB_OUTPUT"
            echo "package_name=com.destinyai.astrology" >> "$GITHUB_OUTPUT"
          else
            echo "flavor=staging" >> "$GITHUB_OUTPUT"
            echo "track=internal" >> "$GITHUB_OUTPUT"
            echo "package_name=com.destinyai.astrology.staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release AAB
        run: |
          FLAVOR="${{ steps.config.outputs.flavor }}"
          # Capitalize first letter for Gradle task name (stagingRelease → bundleStagingRelease)
          FLAVOR_CAP="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
          ./gradlew "bundle${FLAVOR_CAP}Release" \
            -PversionCode="${{ github.run_number }}" \
            --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: /tmp/destiny-release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/668639087682/locations/global/workloadIdentityPools/github-actions-pool/providers/android-deploy
          service_account: android-deploy@circular-genius-481518-v0.iam.gserviceaccount.com

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          packageName: ${{ steps.config.outputs.package_name }}
          releaseFiles: app/build/outputs/bundle/${{ steps.config.outputs.flavor }}Release/*.aab
          track: ${{ steps.config.outputs.track }}
          status: completed

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/destiny-release.keystore
