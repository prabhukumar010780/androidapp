name: Android CI

on:
  push:
    branches: [ main, test, develop ]
  pull_request:
    branches: [ main, test ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Lint
        run: ./gradlew lintStagingRelease -PAPI_KEY_STAGING=ci_placeholder -PGOOGLE_SERVER_CLIENT_ID=ci_placeholder --no-daemon

      - name: Unit tests
        run: ./gradlew testStagingReleaseUnitTest -PAPI_KEY_STAGING=ci_placeholder -PGOOGLE_SERVER_CLIENT_ID=ci_placeholder --no-daemon

      - name: Build staging debug (smoke build)
        run: ./gradlew assembleStagingDebug --no-daemon

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-stagingRelease.html

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  instrumentation-tests:
    runs-on: macos-latest
    # Connected/instrumentation tests run on PRs and the test branch only.
    # Skipped on main pushes (already validated upstream) and branches that
    # do not affect the Android module.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/test'
    # Emulator boot is flaky on GitHub runners — don't block merges on it.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Run connected (instrumentation) tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_5
          emulator-boot-timeout: 900
          script: ./gradlew connectedStagingDebugAndroidTest --no-daemon

      - name: Upload instrumentation test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-results
          path: app/build/reports/androidTests/
